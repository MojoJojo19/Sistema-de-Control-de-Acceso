# mosquitto.conf
# =================================================================
# General configuration
# =================================================================
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# =================================================================
# Listeners
# =================================================================

# Listener 1: Unencrypted MQTT (Port 1883)
# Useful for local dev if TLS is too heavy for ESP32 initially,
# but specs mandate TLS. Kept for Capa 3 internal backend which is safe.
listener 1883

# Listener 2: Encrypted MQTT (MQTTS - Port 8883)
# Required by specs for ESP32-S3 nodes.
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile /mosquitto/certs/mosquitto.key

# Listener 3: Unencrypted WebSockets (Port 9001)
listener 9001
protocol websockets

# Listener 4: Encrypted WebSockets (WSS - Port 9002)
# Required by specs for secure Dashboard access.
listener 9002
protocol websockets
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile /mosquitto/certs/mosquitto.key

# =================================================================
# Authentication (mosquitto-go-auth plugin)
# =================================================================
# We use the HTTP backend to validate JWTs against Capa 3
auth_plugin /mosquitto/go-auth.so

# Configuración del backend HTTP
auth_opt_backends http
auth_opt_http_host host.docker.internal
auth_opt_http_port 5000
auth_opt_http_getuser_uri /api/v1/auth/mqtt
auth_opt_http_superuser_uri /api/v1/auth/mqtt/superuser
auth_opt_http_aclcheck_uri /api/v1/auth/mqtt/acl

# By default, do not allow anonymous users (spec requirement: JWT)
allow_anonymous false
